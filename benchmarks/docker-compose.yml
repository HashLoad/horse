version: '3.8'

services:
  # 1. Horse Lazarus/FPC com fphttpserver (Default)
  fpc-horse-default:
    build:
      context: ../
      dockerfile: benchmarks/suites/fpc-horse-default/Dockerfile
    container_name: fpc-horse-default
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M

  # 2. Horse Lazarus/FPC com epoll
  fpc-horse-epoll:
    build:
      context: ../
      dockerfile: benchmarks/suites/fpc-horse-epoll/Dockerfile
